name: sensor-proto

services:
  sensor-mock:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: realsense
      args:
        INSTALL_REALSENSE: "0"
        INSTALL_ORBBEC: "0"
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      PYTHONUNBUFFERED: "1"
    command: ["--config", "configs/mock-session.json"]

  sensor-hw:
    profiles: ["hw"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: realsense
      ssh:
        - default
      args:
        INSTALL_REALSENSE: ${SENSOR_HW_INSTALL_REALSENSE:-1}
        INSTALL_ORBBEC: ${SENSOR_HW_INSTALL_ORBBEC:-1}
        PYORBBECSDK_REPO: ${SENSOR_HW_PYORBBECSDK_REPO:-git@github.com:orbbec/pyorbbecsdk.git}
    working_dir: /workspace
    privileged: true
    network_mode: host
    volumes:
      - ..:/workspace
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
    environment:
      PYTHONUNBUFFERED: "1"
    command: ["--config", "configs/hw-session.example.json"]

  sensor-stream:
    profiles: ["hw"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: realsense
      args:
        INSTALL_REALSENSE: "1"
        INSTALL_ORBBEC: "0"
    working_dir: /workspace
    privileged: true
    volumes:
      - ..:/workspace
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      PYTHONUNBUFFERED: "1"
    entrypoint: ["python3", "-m", "sensor_proto.stream_main"]
    command:
      [
        "--config",
        "configs/realsense-8cam-session.json",
        "--generated-config",
        "artifacts/realsense-8cam-stream-runtime.json",
      ]

  sensor-hikrobot-stream:
    profiles: ["hikrobot"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: hikrobot
    working_dir: /workspace
    privileged: true
    volumes:
      - ..:/workspace
      - /dev/bus/usb:/dev/bus/usb
      - /run/udev:/run/udev:ro
      - /opt/MVS:/opt/MVS:ro
    ports:
      - "0.0.0.0:8787:8787"
    environment:
      PYTHONUNBUFFERED: "1"
      MVCAM_COMMON_RUNENV: /opt/MVS/lib
    entrypoint: ["python3", "-m", "sensor_proto.stream_main"]
    command:
      [
        "--config",
        "configs/hikrobot-stream.json",
        "--generated-config",
        "artifacts/hikrobot-stream-runtime.json",
      ]
